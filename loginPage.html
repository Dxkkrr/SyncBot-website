<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" href="style/loginPage.css">

    <!-- Remix Icons -->
    <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" />

    <title>SyncBot Website</title>
</head>

<body>

<section class="login">
    <div class="login__content">

        <div>
            <h2 class="login__title">Welcome to SyncBot</h2>

            <form class="login__form">

                <button type="button" id="discord-login" class="login__button">
                    <i class="ri-discord-fill"></i> Login with Discord
                </button>

                <p class="login__sign">
                    Login using your Discord account
                </p>

            </form>
        </div>

        <div class="login__image">
            <img src="images/LogoGif.gif" alt="login_image" class="login__img">
        </div>

    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="js/main.js"></script>

</body>
</html>
